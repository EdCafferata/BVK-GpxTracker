<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Witte achtergrond -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- Horizontale balk onderaan -->
  <rect x="155" y="735" width="714" height="65" rx="8" fill="#E8000A"/>

  <!-- Mast BOVEN de ring -->
  <rect x="476" y="55" width="72" height="170" rx="6" fill="#E8000A"/>

  <!-- Mast ONDER de ring (tussen ring en horizontale balk) -->
  <rect x="476" y="725" width="72" height="80" rx="0" fill="#E8000A"/>

  <!-- Rode cirkelring — dikke solide ring -->
  <circle cx="512" cy="450" r="288" fill="#E8000A"/>
  <circle cx="512" cy="450" r="215" fill="white"/>

  <!-- Touw-textuur: gestippelde lijnen aan beide kanten van de ring -->
  <circle cx="512" cy="450" r="276" fill="none" stroke="white" stroke-width="10" stroke-dasharray="20 13"/>
  <circle cx="512" cy="450" r="227" fill="none" stroke="white" stroke-width="8" stroke-dasharray="16 11"/>

  <!-- Mast door het midden van de ring (smal, enkel de doorgang) -->
  <rect x="490" y="162" width="44" height="576" rx="0" fill="#E8000A"/>

  <!-- "BvK" tekst — iets naar links verschoven zodat de v de mast raakt -->
  <text x="512" y="498"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="170"
        fill="#1E90FF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-2">BvK</text>
</svg>
